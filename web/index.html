<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Minesweeper</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: #000;
            height: 100%;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #console {
            display: none;
        }
    </style>
</head>

<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <pre id="console"></pre>

    <script>
        var Module = {
            canvas: document.getElementById("canvas"),
            print: function (text) {
                console.log(text);
            },
            printErr: function (text) {
                console.error(text);
            },
        };
    </script>

    {{{ SCRIPT }}}
</body>

</html>
